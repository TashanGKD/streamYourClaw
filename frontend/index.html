<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 工作直播</title>
    
    <!-- Google Fonts - 圆润卡通风格 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mindmap.css">
    <link rel="stylesheet" href="css/status.css">
</head>
<body>
    <!-- 背景层（填充剩余空间） -->
    <div class="background"></div>
    
    <!-- 主容器（固定 9:16 比例） -->
    <div class="live-container">
        <div class="container">
            <!-- 顶部：链式思维导图区 -->
            <header class="mindmap-section">
                <div class="section-label">任务思维导图</div>
                <div class="mindmap-container" id="mindmap-container">
                    <!-- Mermaid 思维导图将渲染在这里 -->
                    <div class="mindmap-placeholder">
                        <div class="loading-spinner"></div>
                        <p>加载思维导图中...</p>
                    </div>
                </div>
            </header>

            <!-- 中央：内容展示区（预留空白） -->
            <main class="content-section">
                <div class="section-label">内容展示</div>
                <div class="content-placeholder" id="content-placeholder">
                    <!-- 预留给未来的研究结果展示区 -->
                </div>
            </main>

            <!-- 底部：状态栏 -->
            <footer class="status-section">
                <!-- 左侧：小龙虾状态展示 -->
                <div class="status-display">
                    <div class="section-label">🦞小龙虾状态</div>
                    <div class="status-gif-container">
                        <!-- 视频播放器 -->
                        <video 
                            id="crab-status-video"
                            class="status-video"
                            autoplay
                            loop
                            muted
                            playsinline
                            preload="auto"
                        >
                            <source src="" type="video/mp4">
                        </video>
                        <!-- 降级方案：Emoji 动画显示 -->
                        <div id="crab-status-fallback" class="status-emoji-fallback" style="display: none;">
                            <div class="emoji-animation">
                                <span class="emoji-icon" id="emoji-icon">💭</span>
                                <div class="emoji-bubbles">
                                    <span class="bubble bubble-1"></span>
                                    <span class="bubble bubble-2"></span>
                                    <span class="bubble bubble-3"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="status-indicator" id="status-indicator">
                        <span class="indicator-dot thinking"></span>
                        <span class="indicator-text">思考中</span>
                    </div>
                </div>

                <!-- 右侧：思考详情展示 -->
                <div class="thought-logger">
                    <div class="section-label">思考过程</div>
                    <div class="logger-container" id="logger-container">
                        <div class="log-entry initial">
                            <span class="log-time">00:00:00</span>
                            <svg class="log-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
                                <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
                                <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
                                <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
                            </svg>
                            <span class="log-message">系统初始化完成，等待任务...</span>
                        </div>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <!-- 引入 Mermaid.js -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <!-- JavaScript 模块 -->
    <script src="js/video-status.js"></script>
    <script src="js/status.js"></script>
    <script src="js/thought-logger.js"></script>
    <script src="js/mindmap.js"></script>
    <script src="js/mock-agent.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
